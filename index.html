<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AR Data Filter Demo</title>

  <script src="./libs/aframe.min.js"></script>
  <script src="./libs/aframe-ar.js"></script>
  <script src="./libs/three.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    /* UI overlay */
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 8px;
      color: white;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div id="ui">
  <label>Filter (Z threshold):</label><br>
  <input id="slider" type="range" min="0" max="1" step="0.05" value="0.5">
</div>

<a-scene embedded arjs="debugUIEnabled: false;">
  
  <a-marker preset="hiro">
    <a-entity id="graph"></a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  
const graph = document.querySelector("#graph");

let data = [];

// --------------------
// Load Python dataset
// --------------------
fetch("data.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    render(0.3);
    animateRotation();
  });

// --------------------
// Render function
// --------------------
function render(threshold) {
  graph.innerHTML = "";

  data
    .filter(d => d.value >= threshold)
    .forEach(d => {
      const point = document.createElement("a-sphere");

      point.setAttribute(
        "position",
        `${d.x} ${d.z} ${d.y}`
      );

      point.setAttribute("radius", 0.03);
      point.setAttribute("color", "#4CC3D9");

      graph.appendChild(point);
    });
}

// --------------------
// Slider filter
// --------------------
document.getElementById("slider").addEventListener("input", (e) => {
  render(parseFloat(e.target.value));
});

let startX = 0;
let currentRotation = 0;

// --------------------
// Touch start
// --------------------
document.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
});

// --------------------
// Touch move (swipe)
// --------------------
document.addEventListener("touchmove", (e) => {
  const x = e.touches[0].clientX;
  const delta = x - startX;

  // convert swipe → rotation
  currentRotation += delta * 0.1;

  graph.setAttribute("rotation", `0 ${currentRotation} 0`);

  startX = x; // update for continuous control
}
</script>

</body>
</html>
